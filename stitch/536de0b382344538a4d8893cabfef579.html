<div class="mb-lg flex items-center justify-between">
<div>
<div class="flex items-center text-on-surface-variant mb-xs">
<a class="font-body-sm text-body-sm hover:text-primary transition-colors" href="#">Leads</a>
<span class="material-symbols-outlined text-[16px] mx-[4px]">chevron_right</span>
<span class="font-body-sm text-body-sm text-on-surface">Create New Lead</span>
</div>
<h2 class="font-h1 text-h1 text-on-surface">Create New Lead</h2>
</div>

<div class="bg-surface-container border border-outline-variant rounded-lg p-lg shadow-sm">
<form>
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
<!-- Section: General Info -->
<div class="col-span-1 md:col-span-2 mb-md">
<h3 class="font-h2 text-h2 text-primary border-b border-outline-variant pb-xs mb-sm">General Information</h3>
</div>
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant block uppercase tracking-widest" for="lead-name">Lead Name <span class="text-error">*</span></label>
<input class="w-full bg-surface-dim border border-outline-variant rounded h-[32px] px-sm text-body-sm focus:border-primary-container focus:outline-none focus:ring-0 text-on-surface" id="lead-name" name="lead-name" placeholder="e.g. Acme Corp Greenhouse" required="" type="text"/>
</div>
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant block uppercase tracking-widest" for="company">Company</label>
<input class="w-full bg-surface-dim border border-outline-variant rounded h-[32px] px-sm text-body-sm focus:border-primary-container focus:outline-none focus:ring-0 text-on-surface" id="company" name="company" placeholder="Company Name" type="text"/>
</div>
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant block uppercase tracking-widest" for="source">Source</label>
<select class="w-full bg-surface-dim border border-outline-variant rounded h-[32px] px-sm text-body-sm focus:border-primary-container focus:outline-none focus:ring-0 text-on-surface appearance-none cursor-pointer" id="source" name="source">
<option disabled="" selected="" value="">Select Source</option>
<option value="trade_show">Trade Show</option>
<option value="referral">Referral</option>
<option value="website">Website Inquiry</option>
<option value="outbound">Outbound Sales</option>
</select>
</div>
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant block uppercase tracking-widest" for="est-value">Estimated Value ($)</label>
<input class="w-full bg-surface-dim border border-outline-variant rounded h-[32px] px-sm text-body-sm font-mono-data text-mono-data focus:border-primary-container focus:outline-none focus:ring-0 text-on-surface" id="est-value" name="est-value" placeholder="0.00" type="number"/>
</div>
<!-- Section: Status & Follow-up -->
<div class="col-span-1 md:col-span-2 mt-md mb-md">
<h3 class="font-h2 text-h2 text-primary border-b border-outline-variant pb-xs mb-sm">Status &amp; Action</h3>
</div>
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant block uppercase tracking-widest" for="status">Status <span class="text-error">*</span></label>
<select class="w-full bg-surface-dim border border-outline-variant rounded h-[32px] px-sm text-body-sm focus:border-primary-container focus:outline-none focus:ring-0 text-on-surface appearance-none cursor-pointer" id="status" name="status" required="">
<option value="new">New</option>
<option value="contacted">Contacted</option>
<option value="qualified">Qualified</option>
<option value="proposal">Proposal Sent</option>
</select>
</div>
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant block uppercase tracking-widest" for="next-date">Next Action Date</label>
<input class="w-full bg-surface-dim border border-outline-variant rounded h-[32px] px-sm text-body-sm focus:border-primary-container focus:outline-none focus:ring-0 text-on-surface [color-scheme:dark]" id="next-date" name="next-date" type="date"/>
</div>
<div class="col-span-1 md:col-span-2 space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant block uppercase tracking-widest" for="next-action">Next Action Details</label>
<textarea class="w-full bg-surface-dim border border-outline-variant rounded px-sm py-xs text-body-sm focus:border-primary-container focus:outline-none focus:ring-0 text-on-surface resize-none" id="next-action" name="next-action" placeholder="Describe the next steps..." rows="3"></textarea>
</div>
</div>

<div class="mt-lg pt-md border-t border-outline-variant flex justify-end space-x-sm">
<button class="h-[32px] px-md rounded border border-outline-variant text-on-surface font-body-sm text-body-sm hover:bg-surface-container-highest transition-colors" type="button">
                                Cancel

                                Save Lead

</div>
